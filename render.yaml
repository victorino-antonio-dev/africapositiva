services:
  - type: web
    name: africapositiva
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
